name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Package release artifacts
        shell: bash
        run: |
          set -euo pipefail

          release_name="biolume-ar-gesture-${GITHUB_REF_NAME}"
          staging_dir="release/${release_name}"

          mkdir -p "${staging_dir}"
          cp -R dist "${staging_dir}/dist"
          cp README.md README_ZH.md LICENSE package.json package-lock.json "${staging_dir}/"

          tar -czf "${release_name}.tar.gz" -C release "${release_name}"
          (cd release && zip -r "../${release_name}.zip" "${release_name}")
          shasum -a 256 "${release_name}.tar.gz" "${release_name}.zip" > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "biolume-ar-gesture-${GITHUB_REF_NAME}.tar.gz" \
            "biolume-ar-gesture-${GITHUB_REF_NAME}.zip" \
            checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Biolume AR Gesture ${GITHUB_REF_NAME}" \
            --notes "Automated release generated by GitHub Actions from tag ${GITHUB_REF_NAME}."
